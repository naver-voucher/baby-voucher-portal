<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>베이비바우처 판매자 포털</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    /* Surfaces */
    --bg-primary:#0a0a0a; --bg-secondary:#121212; --bg-card:#181818;
    --bg-card-hover:#1f1f1f; --bg-elevated:#242424; --bg-input:#0e0e0e;
    --border:#262626; --border-light:#2f2f2f; --border-strong:#3a3a3a;
    /* Text */
    --text-primary:#f7f7f8; --text-secondary:#a7a7ad; --text-tertiary:#6e6e73;
    /* Naver palette */
    --naver-green:#03c75a; --naver-green-hover:#00b050; --naver-green-dim:rgba(3,199,90,.12);
    --naver-plus:#00e472; /* Naver+ 밝은 라임 */
    --plus-gradient: linear-gradient(135deg, #03c75a 0%, #00e472 100%);
    /* Accents */
    --accent-green:#30d158; --accent-green-dim:rgba(48,209,88,.12);
    --accent-blue:#0a84ff; --accent-blue-dim:rgba(10,132,255,.12);
    --accent-orange:#ff9f0a; --accent-orange-dim:rgba(255,159,10,.12);
    --accent-red:#ff453a; --accent-red-dim:rgba(255,69,58,.12);
    --accent-purple:#bf5af2; --accent-purple-dim:rgba(191,90,242,.12);
    /* Shape */
    --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:22px;
    --shadow-sm:0 1px 2px rgba(0,0,0,.2);
    --shadow:0 4px 24px rgba(0,0,0,.35);
    --shadow-lg:0 12px 40px rgba(0,0,0,.5);
  }

  body {
    font-family:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,system-ui,'Segoe UI',Roboto,sans-serif;
    background:
      radial-gradient(ellipse 800px 500px at 50% -200px, rgba(3,199,90,.08), transparent 60%),
      var(--bg-primary);
    background-attachment: fixed;
    color:var(--text-primary);
    line-height:1.55; min-height:100vh;
    -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale;
    font-feature-settings:"ss01","ss02","cv11";
    letter-spacing:-0.01em;
  }

  /* Naver brand mark */
  .naver-mark {
    display:inline-flex; align-items:center; gap:8px;
  }
  .naver-n {
    width:22px; height:22px; border-radius:6px;
    background:var(--naver-green);
    display:inline-flex; align-items:center; justify-content:center;
    font-weight:900; color:#fff; font-size:14px; letter-spacing:-.03em;
    font-family:Arial,sans-serif;
  }
  .naver-plus-lockup {
    display:inline-flex; align-items:center; gap:0;
    font-weight:800; letter-spacing:-.02em;
  }
  .naver-plus-lockup .np-n {
    width:26px; height:26px; border-radius:7px;
    background:var(--naver-green); color:#fff;
    display:inline-flex; align-items:center; justify-content:center;
    font-size:16px; font-family:Arial,sans-serif; font-weight:900;
  }
  .naver-plus-lockup .np-text {
    margin-left:8px; color:var(--text-primary); font-size:13px;
  }
  .naver-plus-lockup .np-plus {
    display:inline-block; margin-left:4px;
    background:var(--plus-gradient); -webkit-background-clip:text;
    background-clip:text; color:transparent;
    font-weight:900; font-size:14px;
  }

  .container { max-width:920px; margin:0 auto; padding:24px 20px 120px; }

  /* ───── Hero ───── */
  .hero {
    background: linear-gradient(135deg, rgba(3,199,90,.10), rgba(10,132,255,.06));
    border:1px solid rgba(3,199,90,.25);
    border-radius:var(--r-xl);
    padding:28px 32px; margin-bottom:20px;
    position:relative; overflow:hidden;
  }
  .hero::after {
    content:''; position:absolute; right:-60px; top:-60px;
    width:220px; height:220px; border-radius:50%;
    background:radial-gradient(circle, rgba(3,199,90,.18), transparent 70%);
    pointer-events:none;
  }
  .hero-kicker {
    display:inline-flex; align-items:center; gap:6px;
    padding:4px 10px; border-radius:999px;
    background:rgba(3,199,90,.15); color:var(--naver-green);
    font-size:11px; font-weight:700; letter-spacing:.02em;
    margin-bottom:12px;
  }
  .hero-title { font-size:26px; font-weight:700; letter-spacing:-.02em; margin-bottom:4px; }
  .hero-sub { color:var(--text-secondary); font-size:14px; }
  .hero-meta {
    margin-top:18px; padding-top:16px;
    border-top:1px solid rgba(255,255,255,.08);
    display:grid; grid-template-columns:repeat(4,1fr); gap:16px;
  }
  .hero-meta-item .label {
    font-size:10px; color:var(--text-tertiary); text-transform:uppercase;
    letter-spacing:.06em; margin-bottom:4px;
  }
  .hero-meta-item .value { font-size:13px; font-weight:600; color:var(--text-primary); }
  /* Deadline banner */
  .deadline {
    display:flex; align-items:center; gap:16px;
    padding:16px 22px; margin-bottom:20px;
    border-radius:var(--r-lg);
    background:linear-gradient(135deg, rgba(255,69,58,.18), rgba(255,159,10,.12));
    border:1px solid rgba(255,69,58,.35);
    position:relative; overflow:hidden;
  }
  .deadline::before {
    content:''; position:absolute; top:0; left:0; bottom:0; width:4px;
    background:var(--accent-red);
  }
  .deadline-icon {
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,69,58,.2); color:var(--accent-red);
    display:flex; align-items:center; justify-content:center;
    font-size:22px; flex-shrink:0;
    animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.6;} }
  .deadline-main { flex:1; min-width:0; }
  .deadline-label {
    font-size:11px; font-weight:700; letter-spacing:.05em;
    color:var(--accent-red); text-transform:uppercase; margin-bottom:2px;
  }
  .deadline-date { font-size:17px; font-weight:700; color:var(--text-primary); margin-bottom:2px; }
  .deadline-sub { font-size:12px; color:var(--text-secondary); }
  .deadline-count {
    font-size:13px; font-weight:700;
    padding:6px 14px; border-radius:999px;
    background:rgba(255,69,58,.15); color:var(--accent-red);
    border:1px solid rgba(255,69,58,.3); white-space:nowrap;
  }
  .deadline.passed { background:linear-gradient(135deg, rgba(110,110,115,.15), rgba(110,110,115,.08)); border-color:rgba(110,110,115,.35); }
  .deadline.passed::before { background:var(--text-tertiary); }
  .deadline.passed .deadline-icon { background:rgba(110,110,115,.15); color:var(--text-tertiary); animation:none; }
  .deadline.passed .deadline-label { color:var(--text-tertiary); }
  .deadline.passed .deadline-count { background:rgba(110,110,115,.15); color:var(--text-tertiary); border-color:rgba(110,110,115,.3); }
  .deadline.urgent .deadline-count { animation:pulse 1s ease-in-out infinite; }
  @media(max-width:600px){ .deadline{flex-direction:column;align-items:flex-start;} }

  /* Guide image */
  .guide-img {
    margin-top:10px; border-radius:10px; overflow:hidden;
    border:1px solid var(--border); background:var(--bg-secondary);
    max-width:100%;
  }
  .guide-img img { width:100%; display:block; }
  .guide-img img.broken { display:none; }
  .guide-img.broken { min-height:120px; display:flex; align-items:center; justify-content:center;
    color:var(--text-tertiary); font-size:12px; padding:24px; text-align:center; }
  .guide-caption {
    padding:8px 12px; font-size:11px; color:var(--text-tertiary);
    background:var(--bg-card); border-top:1px solid var(--border);
  }

  /* Expose example (section 3) */
  .expose-grid {
    display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:12px; margin-top:12px;
  }
  .expose-card {
    border-radius:10px; overflow:hidden;
    border:1px solid var(--border); background:var(--bg-elevated);
  }
  .expose-card img { width:100%; display:block; aspect-ratio:1/1; object-fit:cover; }
  .expose-meta { padding:10px 12px; }
  .expose-label {
    font-size:10px; color:var(--text-tertiary); text-transform:uppercase;
    letter-spacing:.06em; margin-bottom:3px;
  }
  .expose-place { font-size:13px; font-weight:600; color:var(--text-primary); }

  .filename-chip {
    display:inline-block; padding:3px 10px; border-radius:6px;
    background:var(--bg-secondary); border:1px solid var(--border-light);
    font-family:'SF Mono',Menlo,monospace; font-size:12px;
    color:var(--naver-green);
  }

  .hero-email { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .btn-pill {
    padding:3px 10px; border-radius:999px;
    background:rgba(255,255,255,.08); color:var(--text-primary);
    border:1px solid rgba(255,255,255,.12);
    font-size:11px; font-weight:600; cursor:pointer;
    font-family:inherit; transition:all .15s;
    white-space:nowrap;
  }
  .btn-pill:hover {
    background:rgba(3,199,90,.15); border-color:rgba(3,199,90,.35);
    color:var(--naver-green);
  }
  @media(max-width:640px){ .hero-meta{grid-template-columns:repeat(2,1fr);} }

  /* ───── Contract Type Card ───── */
  .contract-type {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:var(--r-lg); padding:20px 24px; margin-bottom:20px;
    display:flex; align-items:center; gap:20px;
  }
  .ct-icon {
    width:56px; height:56px; border-radius:14px;
    background:linear-gradient(135deg,rgba(48,209,88,.2),rgba(48,209,88,.05));
    display:flex; align-items:center; justify-content:center;
    font-size:28px; flex-shrink:0;
  }
  .ct-main { flex:1; min-width:0; }
  .ct-label {
    font-size:11px; color:var(--text-tertiary); text-transform:uppercase;
    letter-spacing:.06em; margin-bottom:4px;
  }
  .ct-name { font-size:18px; font-weight:700; margin-bottom:4px; }
  .ct-desc { font-size:13px; color:var(--text-secondary); }
  .ct-terms {
    padding:6px 12px; border-radius:8px;
    background:var(--bg-elevated); color:var(--text-secondary);
    font-size:12px; font-weight:600; text-decoration:none;
    border:1px solid var(--border-light);
    transition:all .15s;
  }
  .ct-terms:hover { background:var(--bg-card-hover); color:var(--text-primary); }

  /* ───── Progress Bar ───── */
  .progress-wrap {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:var(--r-lg); padding:18px 24px; margin-bottom:24px;
  }
  .progress-head {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:10px;
  }
  .progress-head h3 { font-size:13px; font-weight:600; color:var(--text-secondary); }
  .progress-pct { font-size:14px; font-weight:700; color:var(--accent-green); }
  .progress-track {
    height:6px; background:var(--bg-elevated); border-radius:999px; overflow:hidden;
  }
  .progress-fill {
    height:100%; background:linear-gradient(90deg,var(--naver-green),var(--accent-green));
    border-radius:999px; width:0; transition:width .4s ease;
  }
  .progress-steps {
    margin-top:14px; display:flex; gap:8px; flex-wrap:wrap;
  }
  .pstep {
    flex:1; min-width:120px; padding:10px 12px; border-radius:10px;
    background:var(--bg-elevated); border:1px solid var(--border);
    display:flex; align-items:center; gap:8px;
    font-size:12px; transition:all .15s;
  }
  .pstep .dot {
    width:16px; height:16px; border-radius:50%;
    background:var(--bg-secondary); border:1.5px solid var(--border-strong);
    flex-shrink:0; display:flex; align-items:center; justify-content:center;
    font-size:10px; color:var(--text-tertiary);
  }
  .pstep.done { border-color:rgba(48,209,88,.3); background:rgba(48,209,88,.08); }
  .pstep.done .dot { background:var(--accent-green); border-color:var(--accent-green); color:#000; }
  .pstep.done .dot::before { content:'✓'; font-weight:800; }

  /* ───── Section ───── */
  .section {
    background:var(--bg-card); border:1px solid var(--border);
    border-radius:var(--r-lg); margin-bottom:16px; overflow:hidden;
  }
  .sec-head {
    padding:20px 24px; display:flex; align-items:center; gap:14px;
    cursor:pointer; user-select:none;
    border-bottom:1px solid transparent; transition:all .15s;
  }
  .sec-head:hover { background:var(--bg-card-hover); }
  .section.open .sec-head { border-bottom-color:var(--border); }
  .sec-num {
    width:32px; height:32px; border-radius:10px;
    background:var(--bg-elevated); color:var(--text-secondary);
    display:flex; align-items:center; justify-content:center;
    font-size:14px; font-weight:700; flex-shrink:0;
    border:1px solid var(--border-light);
  }
  .section.done .sec-num {
    background:var(--accent-green); color:#000; border-color:var(--accent-green);
  }
  .section.done .sec-num::before { content:'✓'; }
  .section.done .sec-num-txt { display:none; }
  .sec-title-wrap { flex:1; min-width:0; }
  .sec-title { font-size:16px; font-weight:600; margin-bottom:2px; }
  .sec-desc { font-size:12px; color:var(--text-tertiary); }
  .sec-chev {
    width:24px; height:24px; color:var(--text-tertiary);
    transition:transform .2s;
  }
  .section.open .sec-chev { transform:rotate(180deg); }
  .sec-body {
    padding:0 24px; max-height:0; overflow:hidden;
    transition:max-height .3s ease, padding .3s ease;
  }
  .section.open .sec-body { padding:8px 24px 24px; max-height:5000px; }

  /* ───── Form ───── */
  .field { margin-bottom:16px; }
  .field-label {
    display:block; font-size:12px; font-weight:600;
    color:var(--text-secondary); margin-bottom:6px;
  }
  .field-label .req { color:var(--accent-red); margin-left:2px; }
  .field-hint { font-size:11px; color:var(--text-tertiary); margin-top:4px; }
  .field-error { font-size:11px; color:var(--accent-red); margin-top:4px; display:none; }
  .field.has-error .field-error { display:block; }
  .field.has-error input, .field.has-error textarea { border-color:var(--accent-red); }

  input[type=text], input[type=email], input[type=tel], input[type=url], textarea, select {
    width:100%; background:var(--bg-input);
    border:1px solid var(--border-light); border-radius:10px;
    padding:11px 14px; color:var(--text-primary);
    font-size:14px; font-family:inherit;
    transition:border-color .15s;
  }
  input:focus, textarea:focus, select:focus {
    outline:none; border-color:var(--naver-green);
  }
  textarea { resize:vertical; min-height:80px; }

  .char-counter {
    display:flex; justify-content:space-between;
    font-size:11px; color:var(--text-tertiary); margin-top:4px;
  }
  .char-counter.over { color:var(--accent-red); }

  .row2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media(max-width:600px){ .row2{grid-template-columns:1fr;} }

  /* Checkbox */
  .check-group { display:flex; flex-direction:column; gap:10px; }
  .check-item {
    display:flex; align-items:flex-start; gap:12px;
    padding:14px 16px; border-radius:10px;
    background:var(--bg-elevated); border:1px solid var(--border);
    cursor:pointer; transition:all .15s;
  }
  .check-item:hover { border-color:var(--border-strong); }
  .check-item.checked {
    background:rgba(48,209,88,.08); border-color:rgba(48,209,88,.3);
  }
  .check-item input { display:none; }
  .check-box {
    width:20px; height:20px; border-radius:6px; flex-shrink:0;
    border:1.5px solid var(--border-strong); background:var(--bg-secondary);
    display:flex; align-items:center; justify-content:center;
    margin-top:1px; transition:all .15s;
  }
  .check-item.checked .check-box {
    background:var(--accent-green); border-color:var(--accent-green);
  }
  .check-item.checked .check-box::before {
    content:'✓'; color:#000; font-weight:800; font-size:13px;
  }
  .check-text { flex:1; min-width:0; }
  .check-title { font-size:14px; font-weight:600; margin-bottom:2px; }
  .check-sub { font-size:12px; color:var(--text-tertiary); }

  /* Buttons */
  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding:10px 18px; border-radius:10px; border:none;
    font-size:13px; font-weight:600; font-family:inherit;
    cursor:pointer; transition:all .15s; text-decoration:none;
  }
  .btn-primary { background:var(--naver-green); color:#000; }
  .btn-primary:hover { background:#04d463; transform:translateY(-1px); }
  .btn-ghost {
    background:var(--bg-elevated); color:var(--text-primary);
    border:1px solid var(--border-light);
  }
  .btn-ghost:hover { background:var(--bg-card-hover); }
  .btn-lg { padding:14px 28px; font-size:14px; }
  .btn-block { width:100%; }
  .btn:disabled { opacity:.4; cursor:not-allowed; transform:none !important; }

  .btn-row { display:flex; gap:10px; margin-top:16px; flex-wrap:wrap; }

  /* Steps (commerce solution guide) */
  .steps { display:flex; flex-direction:column; gap:10px; margin-top:8px; }
  .step {
    display:flex; gap:14px; padding:14px 16px; border-radius:10px;
    background:var(--bg-elevated); border:1px solid var(--border);
  }
  .step-num {
    width:26px; height:26px; border-radius:50%;
    background:var(--bg-card); color:var(--naver-green);
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; flex-shrink:0;
    border:1px solid var(--border-strong);
  }
  .step-content { flex:1; min-width:0; }
  .step-title { font-size:13px; font-weight:600; margin-bottom:3px; }
  .step-desc { font-size:12px; color:var(--text-secondary); line-height:1.55; }
  .step-desc a { color:var(--accent-blue); text-decoration:none; }
  .step-desc a:hover { text-decoration:underline; }

  /* Callout */
  .callout {
    padding:14px 16px; border-radius:10px; font-size:13px;
    display:flex; gap:10px; margin:12px 0;
  }
  .callout-icon { font-size:16px; flex-shrink:0; }
  .callout-info { background:var(--accent-blue-dim); color:#7cc0ff;
    border:1px solid rgba(10,132,255,.25); }
  .callout-warn { background:var(--accent-orange-dim); color:#ffcc80;
    border:1px solid rgba(255,159,10,.25); }
  .callout-success { background:var(--accent-green-dim); color:var(--accent-green);
    border:1px solid rgba(48,209,88,.25); }

  /* Upload */
  .upload {
    border:1.5px dashed var(--border-strong); border-radius:12px;
    padding:28px 20px; text-align:center; cursor:pointer;
    background:var(--bg-input); transition:all .15s;
  }
  .upload:hover, .upload.drag {
    border-color:var(--naver-green); background:rgba(3,199,90,.04);
  }
  .upload-icon { font-size:28px; margin-bottom:8px; }
  .upload-main { font-size:13px; font-weight:600; margin-bottom:3px; }
  .upload-sub { font-size:11px; color:var(--text-tertiary); }
  .upload input[type=file] { display:none; }

  .preview-grid {
    display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr));
    gap:10px; margin-top:12px;
  }
  .preview {
    position:relative; aspect-ratio:1/1; border-radius:10px;
    overflow:hidden; border:1px solid var(--border);
    background:var(--bg-secondary);
  }
  .preview img { width:100%; height:100%; object-fit:cover; }
  .preview .del {
    position:absolute; top:4px; right:4px;
    width:22px; height:22px; border-radius:50%;
    background:rgba(0,0,0,.7); color:#fff; border:none;
    font-size:13px; cursor:pointer; display:flex;
    align-items:center; justify-content:center;
  }
  .preview .meta {
    position:absolute; bottom:0; left:0; right:0;
    padding:4px 6px; font-size:9px; color:#fff;
    background:linear-gradient(transparent, rgba(0,0,0,.8));
  }
  .preview.bad { border-color:var(--accent-red); }
  .preview.bad .meta { color:#ff9e99; }

  /* Asset download */
  .asset-card {
    display:flex; align-items:center; gap:16px; padding:16px 18px;
    border-radius:12px; background:var(--bg-elevated);
    border:1px solid var(--border);
  }
  .asset-icon {
    width:44px; height:44px; border-radius:10px;
    background:var(--accent-blue-dim);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; flex-shrink:0;
  }
  .asset-main { flex:1; min-width:0; }
  .asset-title { font-size:14px; font-weight:600; margin-bottom:2px; }
  .asset-meta { font-size:11px; color:var(--text-tertiary); }

  /* Inquiry list */
  .inq-list { display:flex; flex-direction:column; gap:10px; margin-top:12px; }
  .inq-item {
    padding:12px 14px; border-radius:10px;
    background:var(--bg-elevated); border:1px solid var(--border);
  }
  .inq-top {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:6px; font-size:11px; color:var(--text-tertiary);
  }

<script>
/* ==================== CONFIG ==================== */
const APPS_SCRIPT_URL = ''; // Apps Script 배포 후 URL 입력
const ASSET_DRIVE_URL = 'https://naver.me/GhwItxQL';
const COMMERCE_SOLUTION_URL = 'https://solution.smartstore.naver.com/ko/market';

/* ==================== CONTRACT TYPES ==================== */
const CONTRACT_TYPES = {

  },

    subverticals:['BABY_KOOKMIN'],

  }
};

function resolveContractType(subvertical) {
  if (!subvertical) return null;
  const v = String(subvertical).toUpperCase().trim();
  for (const [key, ct] of Object.entries(CONTRACT_TYPES)) {
    if (ct.subverticals.includes(v)) return { key, ...ct, matchedSubvertical:v };
  }
  // Fallback: 한글 이름 매칭
  for (const [key, ct] of Object.entries(CONTRACT_TYPES)) {
    for (const [code, name] of Object.entries(ct.subVertNames)) {
      if (subvertical.includes(name)) return { key, ...ct, matchedSubvertical:code };
    }
  }
  return null;
}

/* ==================== URL PARAMS ====================
 * 공유 링크는 파라미터 없는 단일 URL. 판매자가 접속 후 랜딩 폼에서
 * 계정ID(acctId)를 입력하면 서버에서 브랜드 정보를 조회해 포털을 연다.
 * 레거시 링크(?b=..&n=..) 호환을 위해 URL 값도 계속 읽음. */
const params = new URLSearchParams(location.search);
const BRAND = {
  acctId:     params.get('b') || sessionStorage.getItem('bv_acctId') || '',
  brandName:  params.get('n') || '',
  subvertical:params.get('v') || params.get('t') || '',
  manager:    params.get('m') || '',
  email:      params.get('e') || '',
  phone:      params.get('p') || '',
  deadline:   params.get('d') || ''
};
// Apps Script 미배포 상태에서도 데모 가능하도록 클라이언트 fallback 매핑
// (서버 조회 실패 시에만 사용, 서버에 Brands 시트가 생기면 자동으로 서버값 우선)
const KNOWN_BRANDS = {
  'ncp_1ntdhz_01': { brandName:'팸퍼스', subvertical:'BABY_YUKAH', managerName:'정서현', managerEmail:'chung.s.9@pg.com' },
  'ncp_1ocyrl_01': { brandName:'베베룬', subvertical:'BABY_KIDSFASHION', managerName:'고연수', managerEmail:'hmpark@themanners.co.kr' },
  'ncp_1obqel_01': { brandName:'리포소 홈', subvertical:'BABY_KOOKMIN', managerName:'이민호', managerEmail:'sorceress5@naver.com' }
};
function hydrateBrandFromClient_(brandId) {
  const key = String(brandId||'').trim();
  const rec = KNOWN_BRANDS[key];
  if (!rec) return { ok:false, error:'not in client map' };
  BRAND.acctId = key;
  BRAND.brandName = rec.brandName;
  BRAND.subvertical = rec.subvertical;
  BRAND.manager = rec.managerName || '';
  BRAND.email = rec.managerEmail || '';
  sessionStorage.setItem('bv_acctId', key);
  return { ok:true, source:'client' };
}

// 서버에서 브랜드 정보 조회. acctId 있을 때만.
function hydrateBrandFromServer_(brandId) {
  if (!APPS_SCRIPT_URL || !brandId) return { ok:false, error:'no server or no id' };
  try {
    const xhr = new XMLHttpRequest();
    xhr.open('GET', APPS_SCRIPT_URL + '?kind=brand&b=' + encodeURIComponent(brandId), false);
    xhr.send();
    if (xhr.status !== 200) return { ok:false, error:'http ' + xhr.status };
    const r = JSON.parse(xhr.responseText || '{}');
    if (r && r.ok) {
      BRAND.acctId      = r.brandId || brandId;
      if (r.brandName)     BRAND.brandName   = r.brandName;
      if (r.subvertical)   BRAND.subvertical = r.subvertical;
      if (r.managerName)   BRAND.manager     = r.managerName;
      if (r.managerEmail)  BRAND.email       = r.managerEmail;
      sessionStorage.setItem('bv_acctId', BRAND.acctId);
      return { ok:true };
    }
    return r;
  } catch(e) { return { ok:false, error:String(e) }; }
}
if (BRAND.acctId) {
  const sr = hydrateBrandFromServer_(BRAND.acctId);
  if (!sr || !sr.ok) hydrateBrandFromClient_(BRAND.acctId); // 서버 실패 시 클라이언트 map fallback
}
const CT = resolveContractType(BRAND.subvertical);

// 해당 연·월의 "마지막 영업일(월~금) 18:00" 반환
// 규칙: 퇴점일 = 그 달 마지막 영업일 오후 6시
function lastBusinessDayOfMonth(year, monthIdx) {
  // monthIdx: 0~11
  const d = new Date(year, monthIdx + 1, 0, 18, 0, 0); // 해당 월 말일 18:00
  while (d.getDay() === 0 || d.getDay() === 6) d.setDate(d.getDate() - 1);
  return d;
}

function computeDeadline() {
  if (BRAND.deadline) {
    const d = new Date(BRAND.deadline);
    if (!isNaN(d)) return d;
  }
  // 기본 회신 마감: 2026-04-24(금) 14:00
  // ※ 퇴점일(=월 마지막 영업일 18시)과는 다른 개념임. 회신마감은 에셋 제출 마감.
  return new Date(2026, 3, 24, 14, 0, 0);
}
const DEADLINE = computeDeadline();
const OPEN_DATE = params.get('o') ? new Date(params.get('o')) : null;

function deadlineState() {
  const now = new Date();
  const diffMs = DEADLINE - now;
  const diffH = Math.floor(diffMs / (1000 * 60 * 60));
  const diffD = Math.floor(diffH / 24);
  if (diffMs < 0) return { passed:true, urgent:false, text:'마감됨' };
  if (diffH < 24) return { passed:false, urgent:true,  text:`${diffH}시간 남음` };
  if (diffD < 3)  return { passed:false, urgent:true,  text:`${diffD}일 ${diffH % 24}시간 남음` };
  return { passed:false, urgent:false, text:`${diffD}일 남음` };
}
function formatDeadline(d) {
  if (!d) return '';
  const wk = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${wk[d.getDay()]}) ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

/* ==================== STATE / STORAGE ==================== */
const STORAGE_KEY = 'bv_seller_v2_' + (BRAND.acctId || 'anon');
const INQUIRY_KEY = 'bv_inquiry_' + (BRAND.acctId || 'anon');

const defaultState = () => ({
  solutionAdded:false,      // Step 1: 커머스솔루션 추가 완료

  benefit2:false,           // Step 2-2: 비용 분담 쿠폰 동의
  benefit3:false,           // Step 2-3: 비용 분담 적립 동의
  brandDesc:'',             // 12자 이내
  logo:null,                // {dataUrl, name, w, h, sizeKB}
  shot:null,                // {dataUrl, name, w, h, sizeKB}
  info: {
    manager:BRAND.manager, phone:BRAND.phone, email:BRAND.email,
    storeUrl:'', address:''
  },
  submittedAt:null,
  updatedAt:null
});

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    return Object.assign(defaultState(), JSON.parse(raw));
  } catch(e) { return defaultState(); }
}
function saveState() {
  state.updatedAt = new Date().toISOString();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
const state = loadState();

function loadInquiries() {
  try { return JSON.parse(localStorage.getItem(INQUIRY_KEY) || '[]'); } catch(e){ return []; }
}
function saveInquiries(list) {
  localStorage.setItem(INQUIRY_KEY, JSON.stringify(list));
}

/* ==================== TOAST ==================== */
let toastTimer;
function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ el.className='toast '+type; }, 2200);
}

/* ==================== PROGRESS ==================== */
function computeProgress() {
  const steps = [
    { key:'solution', done: state.solutionAdded, label:'바우처 계약' },
    { key:'benefit',  done: state.benefit1 && state.benefit2 && state.benefit3, label:'혜택 동의' },
    { key:'material', done: !!state.logo && !!state.shot && !!state.brandDesc && state.brandDesc.length<=12, label:'소재 제출' },
    { key:'info',     done: !!state.info.storeUrl && !!state.info.manager && !!state.info.email, label:'정보 입력' }
  ];
  const done = steps.filter(s=>s.done).length;
  return { steps, done, total:steps.length, pct: Math.round(done/steps.length*100) };
}

/* ==================== RENDER ==================== */
function render() {
  const app = document.getElementById('app');

  // 계정ID 없으면 랜딩 폼 (계정 ID 한 필드만)
  if (!BRAND.acctId) {
    app.innerHTML = `
      <div class="denied" style="max-width:520px;">
        <h1>🏷 베이비바우처 판매자 포털</h1>
        <p style="margin-bottom:24px;">브랜드사별 고유한 <b>계정 ID</b>를 입력해 주세요.</p>
        <form id="acctLoginForm" style="display:flex;flex-direction:column;gap:10px;">
          <label style="font-size:13px;color:var(--text-secondary);">계정 ID <span style="color:var(--accent-red);">*</span></label>
          <input id="acctLoginInput" type="text" autocomplete="off" placeholder="ncp_xxxxxx_xx" required
            style="padding:14px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg-input);color:var(--text-primary);font-size:15px;"

        </form>
        <div id="acctLoginErr" style="margin-top:12px;font-size:13px;min-height:18px;"></div>
        <div style="margin-top:24px;padding:16px;background:var(--bg-elevated,#242424);border:1px solid var(--border);border-radius:10px;">
          <div style="font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:8px;">💡 계정 ID 확인 방법</div>
          <div style="font-size:12px;color:var(--text-secondary);line-height:1.6;">계정 ID는 브랜드사별 <b>고유 번호</b>입니다. 아래 경로에서 확인하세요:</div>
          <div style="font-size:12px;color:var(--text-primary);line-height:1.7;margin-top:8px;padding-left:8px;border-left:2px solid var(--naver-green,#03c75a);">
            스마트스토어센터 →<br>
            <b>스토어 전시관리 → 스토어 관리 → API 정보 → API 연동용 판매자 ID</b>
          </div>
        </div>
      </div>`;

    const f   = document.getElementById('acctLoginForm');
    const inp = document.getElementById('acctLoginInput');
    const err = document.getElementById('acctLoginErr');

    if (f) f.addEventListener('submit', function(ev){
      ev.preventDefault();
      const acct = (inp.value||'').trim();
      if (!acct) {
        err.textContent = '계정 ID 를 입력해 주세요.';
        err.style.color = 'var(--accent-red, #ff453a)';
        return;
      }
      // 서버/클라이언트 map 조회는 시도하되, 없어도 그냥 진입시킴
      // (브랜드명/담당자 등은 포털 내 정보 입력 단계에서 사용자가 채움)
      if (APPS_SCRIPT_URL) { try { hydrateBrandFromServer_(acct); } catch(_) {} }
      try { hydrateBrandFromClient_(acct); } catch(_) {}
      BRAND.acctId = acct;
      sessionStorage.setItem('bv_acctId', acct);
      location.reload();
    });
    setTimeout(() => { if (inp) inp.focus(); }, 50);
    return;
  }

  const p = computeProgress();

  app.innerHTML = `
    <div class="container">
      <div id="nav-hero">${renderHero()}</div>

      <div id="nav-contract">${renderContractTypeCard()}</div>

  setupScrollSpy();
}

function renderDeadlineBanner() {

    ? `<div class="deadline-sub">바우처 오픈: <b style="color:var(--text-primary);">${formatDeadline(OPEN_DATE)}</b> · 오전 10시 노출 적용</div>`

function setupScrollSpy() {
  const links = document.querySelectorAll('.vnav-item');
  if (!links.length) return;

  links.forEach(a=>{
    a.addEventListener('click', e=>{
      e.preventDefault();
      const id = a.dataset.nav;
      const t = document.getElementById(id);
      if (t) window.scrollTo({ top:t.offsetTop - 24, behavior:'smooth' });
    });
  });

  const targets = Array.from(links).map(a=> document.getElementById(a.dataset.nav)).filter(Boolean);
  const onScroll = () => {
    const y = window.scrollY + 120;
    let current = targets[0];
    for (const t of targets) { if (t.offsetTop <= y) current = t; }
    links.forEach(a=> a.classList.toggle('active', a.dataset.nav === current.id));
  };
  window.addEventListener('scroll', onScroll, { passive:true });
  onScroll();
}

/* ==================== HANDLERS ==================== */
function hookHandlers() {
  // Section toggle
  document.querySelectorAll('[data-toggle]').forEach(el=>{
    el.addEventListener('click', e=>{
      if (e.target.closest('a,button,input')) return;
      el.closest('.section').classList.toggle('open');
    });
  });

  // 이미지 로드 실패 → 깔끔한 fallback
  document.querySelectorAll('.guide-img img').forEach(img=>{
    img.addEventListener('error', ()=>{
      img.classList.add('broken');
      const wrap = img.closest('.guide-img');
      if (wrap) wrap.classList.add('broken');
    });
  });

  // Copy-to-clipboard (landing links)
  document.querySelectorAll('[data-copy]').forEach(el=>{
    el.addEventListener('click', (e)=>{
      e.preventDefault();
      const url = el.dataset.copy;
      navigator.clipboard.writeText(url).then(()=>{
        const orig = el.innerHTML;
        el.classList.add('copied');
        el.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg><span>복사됨</span>';
        setTimeout(()=>{ el.classList.remove('copied'); el.innerHTML = orig; }, 1400);
      }).catch(()=>{
        // fallback
        const ta = document.createElement('textarea');
        ta.value = url; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy'); ta.remove();
        el.textContent = '복사됨';
      });
    });
  });

  // Checkbox items (solution + benefits)
  document.querySelectorAll('[data-check]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.preventDefault();
      const key = el.dataset.check;
      state[key] = !state[key];
      saveState();
      render();
    });
  });

  // Brand desc input
  const descEl = document.getElementById('brandDesc');
  if (descEl) {
    descEl.addEventListener('input', e=>{
      state.brandDesc = e.target.value;
      saveState();
      // Light re-render of counter only (avoid full re-render while typing)
      const cnt = document.querySelector('.char-counter');
      if (cnt) {
        const len = state.brandDesc.length;
        cnt.classList.toggle('over', len>12);
        cnt.children[1].textContent = `${len} / 12`;
      }
    });
    descEl.addEventListener('blur', ()=> render());
  }

  // File uploads
  setupUpload('logo', {w:108, h:108});
  setupUpload('shot', {w:450, h:450});

  // File deletion
  document.querySelectorAll('[data-del]').forEach(el=>{
    el.addEventListener('click', e=>{
      e.stopPropagation();
      state[el.dataset.del] = null;
      saveState();
      render();
    });
  });

  // Info fields
  const infoFields = ['manager','phone','email','storeUrl'];
  infoFields.forEach(f=>{
    const key = f === 'storeUrl' ? 'storeUrl' : f;
    const el = document.getElementById('info-' + (f==='storeUrl'?'store':f));
    if (el) {
      el.addEventListener('change', e=>{
        state.info[key] = e.target.value.trim();
        saveState();
        render();
      });
    }
  });

  // Inquiry submit
  const inqBtn = document.getElementById('inq-send');
  if (inqBtn) inqBtn.addEventListener('click', submitInquiry);

  // 문의 유형 변경 → 담당자교체면 구조화 폼으로 스왑
  const inqTypeEl = document.getElementById('inq-type');
  if (inqTypeEl) {
    const syncHandoff = ()=>{
      const isHandoff = inqTypeEl.value === '담당자교체';
      const msgWrap = document.getElementById('inq-msg-wrap');
      const hoForm = document.getElementById('handoff-form');
      if (msgWrap) msgWrap.style.display = isHandoff ? 'none' : '';
      if (hoForm) hoForm.style.display = isHandoff ? '' : 'none';
    };
    inqTypeEl.addEventListener('change', syncHandoff);
    syncHandoff();
  }

  // FAQ toggle
  document.querySelectorAll('[data-faq]').forEach(el=>{
    el.addEventListener('click', ()=> el.classList.toggle('open'));
  });

  // Submit
  const sb = document.getElementById('submit-btn');
  if (sb) sb.addEventListener('click', handleSubmit);

  // 담당자/이메일 교체 공유 버튼 공용 로직
  const openHandoff = (focusEmail=false)=>{
    const inqSec = document.querySelector('[data-sec="inquiry"]');
    if (!inqSec) return;
    inqSec.classList.add('open');
    setTimeout(()=>{
      const target = document.getElementById('nav-inquiry');
      if (target) window.scrollTo({ top: target.offsetTop - 24, behavior:'smooth' });
      const typeSel = document.getElementById('inq-type');
      if (typeSel) {
        typeSel.value = '담당자교체';
        typeSel.dispatchEvent(new Event('change'));
      }
      setTimeout(()=>{
        const el = document.getElementById(focusEmail ? 'ho-email' : 'ho-name');
        if (el) el.focus();
      }, 50);
    }, 100);
  };
  const reqMgrBtn = document.getElementById('req-change-manager');
  if (reqMgrBtn) reqMgrBtn.addEventListener('click', ()=> openHandoff(false));
  const reqEmailBtn = document.getElementById('req-change-email');
  if (reqEmailBtn) reqEmailBtn.addEventListener('click', (e)=>{ e.preventDefault(); openHandoff(true); });

  // Banner download log
  document.querySelectorAll('[data-track=banner-download]').forEach(el=>{
    el.addEventListener('click', ()=> {
      logBannerDownload();
      toast('드라이브를 여는 중…', 'success');
    });
  });
}

function setupUpload(kind) {
  const drop = document.getElementById(kind + '-drop');
  const input = document.getElementById(kind + '-input');
  if (!drop || !input) return;
  drop.addEventListener('click', ()=> input.click());
  drop.addEventListener('dragover', e=>{ e.preventDefault(); drop.classList.add('drag'); });
  drop.addEventListener('dragleave', ()=> drop.classList.remove('drag'));
  drop.addEventListener('drop', e=>{
    e.preventDefault(); drop.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f) readImage(f, kind);
  });
  input.addEventListener('change', e=>{
    const f = e.target.files[0];
    if (f) readImage(f, kind);
  });
}

function readImage(file, kind) {
  if (file.size > 10 * 1024 * 1024) {
    toast('파일은 10MB 이하만 업로드 가능합니다', 'error');
    return;
  }
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    const img = new Image();
    img.onload = () => {
      state[kind] = {
        dataUrl, name:file.name, w:img.naturalWidth, h:img.naturalHeight,
        sizeKB: file.size/1024
      };
      saveState();
      render();
      toast('업로드 완료', 'success');
    };
    img.src = dataUrl;
  };
  reader.readAsDataURL(file);
}

function submitInquiry() {
  const type = document.getElementById('inq-type').value;
  const email = document.getElementById('inq-email').value.trim();
  let msg = '';
  const handoff = {};

  if (type === '담당자교체') {
    const name   = document.getElementById('ho-name').value.trim();
    const mail   = document.getElementById('ho-email').value.trim();
    const phone  = document.getElementById('ho-phone').value.trim();
    const replaceInfo = document.getElementById('ho-replace-info')?.checked;
    if (!name)  { toast('신규 담당자명을 입력해주세요', 'error'); return; }
    if (!mail)  { toast('신규 담당자 이메일을 입력해주세요', 'error'); return; }
    Object.assign(handoff, { name, mail, phone });
    msg = `[브랜드사 담당자 교체 공유]\n\n`
        + `• 기존 담당자: ${BRAND.manager || state.info.manager || ''} (${BRAND.email || state.info.email || ''})\n`
        + `• 신규 담당자명: ${name}\n`
        + `• 신규 담당자 이메일: ${mail}\n`
        + `• 신규 담당자 연락처: ${phone}`;
    if (replaceInfo) {
      state.info.manager = name;
      state.info.email = mail;
      if (phone) state.info.phone = phone;
      saveState();
    }
  } else {
    msg = document.getElementById('inq-msg').value.trim();
    if (!msg) { toast('문의 내용을 입력해주세요', 'error'); return; }
  }

  const id = 'q-' + Date.now();
  const createdAt = new Date().toISOString();
  const inq = { id, createdAt, acctId:BRAND.acctId, brandName:BRAND.brandName, type, email, msg, handoff, status:'pending', answer:'', answeredAt:'' };
  const list = loadInquiries();
  list.unshift(inq);
  saveInquiries(list);

  // 백엔드 전송 (선택적)
  if (APPS_SCRIPT_URL) {
    fetch(APPS_SCRIPT_URL, {
      method:'POST',
      headers: { 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify({ kind:'inquiry', ...inq })
    }).catch(()=>{});
  }

  toast('문의가 접수되었습니다', 'success');
  render();
}

function logBannerDownload() {
  if (!APPS_SCRIPT_URL) return;
  fetch(APPS_SCRIPT_URL, {
    method:'POST',
    headers: { 'Content-Type':'text/plain;charset=utf-8' },
    body: JSON.stringify({
      kind:'banner-download',
      acctId: BRAND.acctId,
      bannerId: new Date().toISOString().slice(0,7),
      at: new Date().toISOString()
    })
  }).catch(()=>{});
}

function handleSubmit() {
  const p = computeProgress();
  if (p.pct !== 100) {
    toast('모든 필수 항목을 완료해 주세요', 'error');
    return;
  }
  state.submittedAt = new Date().toISOString();
  saveState();

  const payload = {
    kind:'submission',
    submittedAt: state.submittedAt,
    acctId: BRAND.acctId,
    brandName: BRAND.brandName,
    subvertical: BRAND.subvertical,
    contractType: CT ? CT.key : null,
    contractTypeName: CT ? CT.name : null,
    solutionAdded: state.solutionAdded,
    benefit: { b1:state.benefit1, b2:state.benefit2, b3:state.benefit3 },
    brandDesc: state.brandDesc,
    info: state.info,
    logo: state.logo,
    shot: state.shot
  };

  if (APPS_SCRIPT_URL) {
    toast('드라이브로 업로드 중…', 'success');
    fetch(APPS_SCRIPT_URL, {
      method:'POST',
      headers: { 'Content-Type':'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    })
      .then(r=>r.json()).then(r=>{
        if (r && r.ok) toast('제출이 완료되었습니다 ✓ 드라이브 저장 완료', 'success');
        else toast('제출은 저장되었으나 서버 전송에 실패했습니다', 'error');
      })
      .catch(()=> toast('네트워크 오류: 로컬에는 저장됨', 'error'));
  } else {
    toast('제출 완료 (로컬 저장됨 · 백엔드 미연결)', 'success');
  }
  render();
}

/* ==================== UTIL ==================== */
function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c=>({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('ko-KR', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

/* ==================== INIT ==================== */
render();
</script>
